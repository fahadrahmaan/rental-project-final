{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join Roamly</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="container">
    <div class="logo">
      <span>Roamly</span>
    </div>
    <nav>
      <ul>
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="{% url 'about' %}">About Us</a></li>
        <li><a href="{% url 'services' %}">Services</a></li>
        <li><a href="{% url 'contact' %}">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container hero-content">
    <div class="hero-text">
      <h1>Join Roamly</h1>
      <p>Select how you want to register:</p>

      <div style="margin-top: 30px;">
        <a href="{% url 'register' %}" class="btn" style="margin-right: 20px;">I'm a Customer</a>
        <a href="{% url 'service_provider_register' %}" class="btn">I'm a Service Provider</a>
      </div>
    </div>
  </div>
</section>

</body>
</html>
